name: Auto Post to Threads

on:
  schedule:
    - cron: '0 9 * * *'   # 台灣時間 17:00
    - cron: '0 12 * * *'  # 台灣時間 20:00
    - cron: '0 16 * * *'  # 台灣時間 00:00（隔天凌晨）
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-genai requests

      - name: Run auto post script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}      - name: Run auto post script
